<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Google Sans',sans-serif;
}

html,body{
width:100%;
overflow-x:hidden;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
padding:40px 15px;
color:#e8ecf1;
background:radial-gradient(circle at 10% 20%,#1b2130,#090b10 60%);
}

/* ===== CONTAINER ===== */

.container{
width:100%;
max-width:1000px;
padding:36px;
border-radius:22px;
background:rgba(18,22,30,.75);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.06);
box-shadow:0 25px 80px rgba(0,0,0,.8);
}

h1{
text-align:center;
margin-bottom:28px;
font-weight:600;
font-size:26px;
}

/* ===== INPUTS ===== */

label{
font-size:13px;
opacity:.75;
}

input,textarea{
width:100%;
margin:6px 0 16px;
padding:14px;
background:#0c1018;
border:1px solid #262c3d;
border-radius:12px;
color:white;
font-size:16px;
}

textarea{
height:120px;
resize:none;
}

input:focus,textarea:focus{
outline:none;
border-color:#748ffc;
}

/* ===== ANIMATED TOGGLE ===== */

.toggleWrapper{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.toggleLabel{
font-size:14px;
opacity:.85;
}

.switch{
position:relative;
display:inline-block;
width:50px;
height:26px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background-color:#2b3245;
border-radius:34px;
transition:.4s;
}

.slider:before{
position:absolute;
content:"";
height:20px;
width:20px;
left:3px;
bottom:3px;
background-color:white;
border-radius:50%;
transition:.4s;
}

input:checked + .slider{
background:linear-gradient(135deg,#5c7cfa,#9775fa);
box-shadow:0 0 12px #5c7cfa88;
}

input:checked + .slider:before{
transform:translateX(24px);
}

/* ===== BUTTONS ===== */

.buttons{
display:flex;
gap:14px;
justify-content:center;
flex-wrap:wrap;
}

button{
padding:14px 22px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:15px;
transition:.3s;
}

.primary{
background:linear-gradient(135deg,#5c7cfa,#9775fa);
color:white;
}

.secondary{
background:#1a2030;
color:#d0d5df;
}

button:hover{
transform:translateY(-3px);
}

/* ===== TEAM GRID ===== */

.teams{
margin-top:35px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:22px;
}

/* ===== TEAM CARD ===== */

.team{
padding:20px;
border-radius:18px;
background:linear-gradient(165deg,rgba(35,41,58,.9),rgba(15,18,26,.95));
border:1px solid rgba(255,255,255,.05);
}

.team h3{
text-align:center;
margin-bottom:12px;
}

li{
list-style:none;
padding:8px 12px;
margin-bottom:6px;
border-radius:8px;
background:rgba(255,255,255,.06);
}

/* ===== COPY BUTTON ===== */

.copyBtn{
margin-top:10px;
width:100%;
padding:9px;
border-radius:8px;
border:none;
background:rgba(255,255,255,.08);
color:#ddd;
cursor:pointer;
transition:.3s;
}

.copyBtn:hover{
background:#5c7cfa;
color:white;
}

/* ===== MOBILE ===== */

@media(max-width:600px){
.container{
padding:20px;
}
.buttons{
flex-direction:column;
}
button{
width:100%;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Make Your Team</h1>

<label>Number of Teams</label>
<input type="number" id="teamCount" value="2" min="1"
oninput="createTeamInputs()">

<div class="toggleWrapper">
<span class="toggleLabel">Enable Custom Team Names</span>
<label class="switch">
<input type="checkbox" id="enableNames" onchange="toggleTeamNames()">
<span class="slider"></span>
</label>
</div>

<div id="teamNameInputs" style="display:none;"></div>

<label>Enter Players</label>
<textarea id="names"
placeholder="Enter names separated by comma or new line"></textarea>

<div class="buttons">
<button class="primary" onclick="generateTeams()">Generate Teams</button>
<button class="secondary" onclick="reshuffle()">Shuffle Again</button>
</div>

<div id="output" class="teams"></div>

</div>

<script>

function toggleTeamNames(){
let box=document.getElementById("teamNameInputs");
box.style.display=document.getElementById("enableNames").checked
? "block" : "none";
createTeamInputs();
}

function createTeamInputs(){
let count=document.getElementById("teamCount").value;
let enabled=document.getElementById("enableNames").checked;
let box=document.getElementById("teamNameInputs");
box.innerHTML="";

if(!enabled) return;

for(let i=0;i<count;i++){
box.innerHTML+=`
<label>Team ${i+1} Name</label>
<input type="text" id="teamName${i}"
placeholder="Enter team name">
`;
}
}

createTeamInputs();

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
}

function getPlayers(){
return document.getElementById("names").value
.split(/[\n,]/)
.map(n=>n.trim())
.filter(Boolean);
}

function getTeamNames(count){
let names=[];
let enabled=document.getElementById("enableNames").checked;

for(let i=0;i<count;i++){
if(enabled){
let val=document.getElementById(`teamName${i}`).value;
names.push(val||`Team ${i+1}`);
}else{
names.push(`Team ${i+1}`);
}
}
return names;
}

function generateTeams(){

let count=parseInt(document.getElementById("teamCount").value);
let players=getPlayers();

if(!players.length){
alert("Add players!");
return;
}

shuffle(players);

let teams=Array.from({length:count},()=>[]);
players.forEach((p,i)=>teams[i%count].push(p));

window.generatedTeams=teams;
window.generatedNames=getTeamNames(count);

renderTeams();
}

function reshuffle(){
if(!window.generatedTeams) return;
generateTeams();
}

function renderTeams(){

let output=document.getElementById("output");
output.innerHTML="";

generatedTeams.forEach((team,i)=>{

let div=document.createElement("div");
div.className="team";

div.innerHTML=`
<h3>${generatedNames[i]}</h3>
<ul>
${team.map(p=>`<li>${p}</li>`).join("")}
</ul>
<button class="copyBtn"
onclick="copyTeam(${i},this)">
Copy Team
</button>
`;

output.appendChild(div);
});
}

function copyTeam(i,btn){
let text=generatedNames[i]+":\n"+
generatedTeams[i].join("\n");

navigator.clipboard.writeText(text).then(()=>{
btn.innerText="Copied!";
setTimeout(()=>btn.innerText="Copy Team",1500);
});
}

</script>

</body>
</html>
